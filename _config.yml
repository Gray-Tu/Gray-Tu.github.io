# Site Settings
title: Gray Tu's Blog
description: 生物資訊 / 資料視覺化 / 技術筆記
author: Gray Tu
url: "https://gray-tu.github.io"
baseurl: ""
repository: Gray-Tu/Gray-Tu.github.io

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Pagination
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata

paginate: 6
paginate_path: "/page/:num/"

# Collections
collections:
  pages:
    output: true
    permalink: /:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "DemoUsed"
    values:
      layout: null

# Keep DemoUsed as static files (no Liquid processing)
keep_files:
  - DemoUsed

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
